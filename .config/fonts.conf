<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>

    <!-- Import normal system config first -->
    <include ignore_missing="yes">/etc/fonts/fonts.conf</include>

    <!-- THEN override only what you want -->

  <selectfont>
        <rejectfont>
            <pattern>
                <patelt name="family" >
                    <string>Noto Color Emoji</string>
                </patelt>
            </pattern>
        </rejectfont>
    </selectfont>

 <alias>
        <family>emoji</family>
        <prefer>
            <family>Noto Emoji</family>
        </prefer>
    </alias>

    <alias>
        <family>monospace</family>
        <prefer>
            <family>JetBrainsMonoNL Nerd Font</family>
            <family>Hack Nerd Font Mono</family>
            <family>Noto Emoji</family>
            <family>Noto Sans Symbols2</family>
            <family>Symbols Nerd Font</family>
        </prefer>
    </alias>

</fontconfig>

